<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Restaurante - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">🍕 Logo Restaurante</a>
            <div class="d-flex">
                <a href="login.html" class="btn btn-outline-light me-2">Iniciar Sesión</a>
                <a href="registro.html" class="btn btn-primary">Registrarse</a>
            </div>
        </div>
    </nav>

    <header class="bg-light py-5 text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">¡Bienvenido a nuestro sabor único!</h1>
            <p class="lead">Pide en línea y recibe en la puerta de tu casa.</p>
            <a href="#menu" class="btn btn-warning btn-lg">Ver Menú</a>
        </div>
    </header>

    <section id="menu" class="container py-5">
        <h2 class="text-center mb-4">Nuestras Especialidades</h2>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Pizza">
                    <div class="card-body text-center">
                        <h5 class="card-title">Pizza Especial</h5>
                        <p class="card-text">$150.00 MXN</p>
                        <button class="btn btn-outline-danger btn-sm">Agregar al carrito</button>
                    </div>
                </div>
            </div>
            </div>
    </section>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2026 Sistema de Restaurante Escalable. Conectado a Aiven & Render.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
