<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mi Restaurante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h2 class="text-center fw-bold mb-4">Crea tu cuenta</h2>
                        <form id="registroForm">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" id="regNombre" class="form-control" placeholder="Ej. Juan Pérez" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Teléfono (será tu usuario)</label>
                                <input type="text" id="regTelefono" class="form-control" placeholder="1234567890" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="regPass" class="form-control" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2">Registrarme</button>
                        </form>
                        <div class="mt-4 text-center">
                            <p class="text-muted small">¿Ya tienes cuenta? <a href="login.html" class="text-success text-decoration-none fw-bold">Inicia sesión aquí</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="js/config.js"></script>
    <script src="js/registro.js"></script>
</body>
</html>
